name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile tracked Python sources
        run: |
          python -c "import py_compile; files=[r'daily_loss_scope.py', r'forex_grid_engine.py', r'eurusd_grid_bot.py.template', r'gbpusd_grid_bot.py.template', r'usdjpy_grid_bot.py.template', r'audusd_grid_bot.py.template', r'nzdusd_grid_bot.py.template', r'usdcad_grid_bot.py.template', r'nas100_grid_bot.py.template', r'tests/test_daily_loss_scope.py']; [py_compile.compile(path, doraise=True) for path in files]; print(f'Compiled {len(files)} files successfully')"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
